<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      class="montserrat-uniquifier"
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form">
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="search-form-input"
          />
          <input type="submit" value="Search" class="search-form-button" />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city">London</h1>
            <p class="weather-app-details">
              Friday 20:32, overcast clouds
              <br />
              Humidity: <strong>92%</strong>, Wind: <strong>1.54km/h</strong>
            </p>
          </div>
          <div class="weather-app-temperature-container">
            <div class="weather-app-temperature"></div>
            <div class="weather-app-icon">☁️</div>
            <div class="weather-app-temperature-value">8</div>
            <div class="weather-app-unit">°C</div>
          </div>
        </div>
      </main>

      <footer>
        This project was coded by
        <a href="https://github.com/jessmavz" target="_blank">
          Jessica Mavambu</a
        >
        hosted on
        <a
          href="https://github.com/jessmavz/Weather-Final-Project"
          target="_blank"
        >
          Github</a
        >
        and website hosted on
        <a href="https://weatherfinalproject.netlify.app/" target="_blank">
          Netify</a
        >
      </footer>
    </div>
  </body>
</html>
